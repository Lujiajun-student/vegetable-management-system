<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #43a047 0%, #66bb6a 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
        }
        .card {
            border-radius: 22px;
            box-shadow: 0 4px 24px rgba(67,160,71,0.13);
            border: none;
        }
        .card-header {
            background: var(--main-green, #43a047);
            color: #fff;
            border-radius: 22px 22px 0 0;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
        }
        .btn-primary {
            background: var(--main-green, #43a047);
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .btn-primary:hover {
            background: #2e7031;
        }
        .form-control:focus {
            border-color: #43a047;
            box-shadow: 0 0 0 0.2rem rgba(67,160,71,0.15);
        }
        .container {
            margin-top: 7vh;
        }
        a {
            color: #43a047;
        }
        a:hover {
            color: #2e7031;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center">用户登录</h3>
                    </div>
                    <div class="card-body">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <form th:action="@{/user/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">登录</button>
                            </div>
                        </form>
                        <div class="text-center mt-3">
                            <a th:href="@{/user/register}">还没有账号？立即注册</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
