<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>订单历史</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">订单历史</h2>
        <div class="row">
            <div class="col-12">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>订单编号</th>
                                <th>下单时间</th>
                                <th>订单状态</th>
                                <th>总金额</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td th:text="${order.id}">1</td>
                                <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 12:00:00</td>
                                <td>
                                    <span th:if="${order.status.name() == 'PENDING'}" class="badge bg-warning">待支付</span>
                                    <span th:if="${order.status.name() == 'PAID'}" class="badge bg-success">已支付</span>
                                    <span th:if="${order.status.name() == 'CANCELLED'}" class="badge bg-danger">已取消</span>
                                </td>
                                <td th:text="${'¥' + order.totalAmount}">¥100.00</td>
                                <td>
                                    <button th:if="${order.status.name() == 'PENDING'}" 
                                            class="btn btn-sm btn-primary"
                                            th:onclick="'payOrder(' + ${order.id} + ')'">支付</button>
                                    <button class="btn btn-sm btn-info"
                                            th:onclick="'showOrderDetails(' + ${order.id} + ')'">查看详情</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 订单详情模态框 -->
    <div class="modal fade" id="orderDetailsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">订单详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="orderDetailsContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function payOrder(orderId) {
            if (confirm('确认支付该订单？')) {
                fetch(`/api/orders/${orderId}/pay`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        alert(result.message);
                        window.location.reload();
                    } else {
                        alert(result.message || '支付失败');
                    }
                })
                .catch(error => {
                    alert('支付失败，请稍后重试');
                });
            }
        }

        function showOrderDetails(orderId) {
            fetch(`/api/orders/${orderId}/details`)
                .then(response => response.json())
                .then(order => {
                    let content = `
                        <div class="mb-3">
                            <h6>订单编号：${order.id}</h6>
                            <h6>下单时间：${new Date(order.createdAt).toLocaleString()}</h6>
                            <h6>订单状态：${order.status}</h6>
                            <h6>总金额：¥${order.totalAmount}</h6>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-sm">
                                <thead>
                                    <tr>
                                        <th>商品名称</th>
                                        <th>单价</th>
                                        <th>数量</th>
                                        <th>小计</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    
                    order.orderItems.forEach(item => {
                        content += `
                            <tr>
                                <td>${item.product.name}</td>
                                <td>¥${item.price}</td>
                                <td>${item.quantity}</td>
                                <td>¥${(item.price * item.quantity).toFixed(2)}</td>
                            </tr>
                        `;
                    });
                    
                    content += `
                                </tbody>
                            </table>
                        </div>
                    `;
                    
                    document.getElementById('orderDetailsContent').innerHTML = content;
                    new bootstrap.Modal(document.getElementById('orderDetailsModal')).show();
                })
                .catch(error => {
                    alert('获取订单详情失败，请稍后重试');
                });
        }
    </script>
</body>
</html>
