<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>蔬菜销售系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --main-green: #43a047;
            --main-green-light: #66bb6a;
            --main-green-dark: #2e7031;
        }
        body {
            background: #f6faf7;
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
        }
        .navbar {
            background: var(--main-green) !important;
        }
        .navbar .navbar-brand, .navbar .nav-link, .navbar .navbar-toggler {
            color: #fff !important;
            font-weight: 600;
            font-size: 1.25rem;
        }
        .navbar .nav-link {
            padding-left: 1.5rem !important;
            padding-right: 1.5rem !important;
            transition: color 0.2s, text-decoration 0.2s, transform 0.2s;
        }
        .navbar .nav-link.active, .navbar .nav-link:hover {
            color: #d0ffd0 !important;
            text-decoration: underline;
            text-underline-offset: 6px;
            transform: scale(1.08);
        }
        .page-container {
            position: relative;
            overflow: hidden;
            min-height: calc(100vh - 56px); /* 减去导航栏高度 */
        }
        .page {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            transition: transform 0.5s ease-in-out;
            background: white;
            min-height: calc(100vh - 56px);
        }
        .page.active {
            transform: translateX(0);
            z-index: 1;
        }
        .page.slide-left {
            transform: translateX(-100%);
            z-index: 0;
        }
        .page.slide-right {
            transform: translateX(100%);
            z-index: 0;
        }
        .chat-container {
            height: 70vh;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 8px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
        }
        .user-message {
            background-color: #e3f2fd;
            margin-left: 20%;
        }
        .ai-message {
            background-color: #f5f5f5;
            margin-right: 20%;
        }
        .input-container {
            margin-top: 0;
            padding: 0 2px;
        }
        /* 商品卡片美化 */
        .product-card {
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(67,160,71,0.08);
            border: 1.5px solid #e0f2f1;
            transition: box-shadow 0.3s, transform 0.2s, border-color 0.2s;
            background: #fff;
        }
        .product-card:hover {
            box-shadow: 0 8px 24px rgba(67,160,71,0.18);
            transform: scale(1.035);
            border-color: var(--main-green-light);
        }
        .product-card .btn-primary {
            background: var(--main-green);
            border: none;
        }
        .product-card .btn-primary:hover {
            background: var(--main-green-dark);
        }
        /* 购物车卡片美化 */
        .card-header.bg-primary {
            background: var(--main-green) !important;
        }
        .card-footer .btn-primary {
            background: var(--main-green);
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .card-footer .btn-primary:hover {
            background: var(--main-green-dark);
        }
        /* 购物车商品列表更紧凑 */
        #cartItems .d-flex {
            padding: 6px 0;
            border-bottom: 1px solid #e0f2f1;
        }
        #cartItems .d-flex:last-child {
            border-bottom: none;
        }
        /* 订单历史等页面留白优化 */
        .container, .container-fluid {
            margin-bottom: 30px;
        }
        /* 浮层提示样式 */
        .custom-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(67,160,71,0.97);
            color: #fff;
            padding: 28px 48px;
            border-radius: 16px;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s;
            box-shadow: 0 8px 32px rgba(67,160,71,0.18);
        }
        .custom-toast.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">蔬菜销售系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showPage('mainPage')">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showPage('ordersPage')">订单历史</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showPage('rechargePage')">充值</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="showPage('chatPage')">AI咨询</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <div class="dropdown">
                        <button class="btn btn-light dropdown-toggle px-4 py-2 fw-bold" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false" style="border-radius: 18px; box-shadow: 0 2px 8px rgba(67,160,71,0.08);">
                            你好，<span id="currentUsername" th:text="${session.currentUser != null ? session.currentUser.username : '用户'}">用户</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><span class="dropdown-item-text">余额：<span id="userBalance" th:text="${userBalance}">0.00</span> 元</span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/user/logout">退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 页面容器 -->
    <div class="page-container">
        <!-- 主页面 -->
        <div id="mainPage" class="page active">
            <div class="container-fluid mt-4">
                <div class="row">
                    <!-- 主内容区域 -->
                    <div class="col-md-8" style="margin-right: 370px;">
                        <div class="row" id="productList">
                            <!-- 商品列表将通过JavaScript动态加载 -->
                        </div>
                    </div>
                    <!-- 购物车固定在右侧中上方，窗口高度适中 -->
                    <div style="position: fixed; top: 80px; right: 40px; width: 330px; max-height: 80vh; z-index: 1050; display: flex; flex-direction: column;">
                        <div class="card" style="height: 100%; display: flex; flex-direction: column;">
                            <div class="card-header bg-primary text-white">购物车</div>
                            <div class="card-body" id="cartItems" style="flex: 1 1 auto; overflow-y: auto; min-height: 80px;">
                                <!-- 购物车商品将通过JavaScript动态加载 -->
                            </div>
                            <div class="card-footer bg-white">
                                <h6>总计: ¥<span id="cartTotal">0.00</span></h6>
                                <button class="btn btn-primary w-100" onclick="checkout()">结算</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 订单历史页面 -->
        <div id="ordersPage" class="page slide-right">
            <div class="container mt-4">
                <h2>订单历史</h2>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>下单时间</th>
                                <th>订单状态</th>
                                <th>总金额</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="orderList">
                            <!-- 订单列表将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 充值页面 -->
        <div id="rechargePage" class="page slide-right">
            <div class="container mt-4">
                <h2>账户充值</h2>
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3 text-center">
                            <span style="font-weight:bold;">请选择支付方式：</span><br>
                            <img src="/WeiXinPayment.png" alt="微信支付" style="height:60px;margin:8px 16px 0 0;vertical-align:middle;">
                            <img src="/ZhiFuBaoPayment.png" alt="支付宝支付" style="height:60px;margin:8px 16px 0 0;vertical-align:middle;">
                            <img src="/YunShanFuPayment.png" alt="云闪付" style="height:60px;margin:8px 0 0 0;vertical-align:middle;">
                        </div>
                        <h5 class="card-title">当前余额: <span th:text="${userBalance}">0.00</span>元</h5>
                        <form id="rechargeForm" class="mt-3">
                            <div class="mb-3">
                                <label for="amount" class="form-label">充值金额</label>
                                <input type="number" class="form-control" id="amount" name="amount" min="0" step="0.01" required>
                            </div>
                            <button type="submit" class="btn btn-primary">确认充值</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI咨询页面 -->
        <div id="chatPage" class="page slide-right">
            <div class="container mt-4">
                <h2 class="text-center mb-4">AI蔬菜助手 - 派蒙</h2>
                <div class="chat-container" id="chatContainer">
                    <div class="message ai-message">
                        你好！我是派蒙，你的蔬菜销售助手。请问有什么可以帮你的吗？
                    </div>
                </div>
                <div class="input-container">
                    <div class="input-group">
                        <input type="text" class="form-control" id="userInput" placeholder="请输入你的问题...">
                        <button class="btn btn-primary" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 订单详情弹窗 -->
    <div class="modal fade" id="orderDetailsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">订单详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="orderDetailsContent"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 浮层提示 -->
    <div id="customToast" class="custom-toast">购买成功！</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 页面切换函数
        function showPage(pageId) {
            const pages = document.querySelectorAll('.page');
            const targetPage = document.getElementById(pageId);
            
            if (!targetPage) return;

            pages.forEach(page => {
                if (page.id === pageId) {
                    page.classList.remove('slide-right', 'slide-left');
                    page.classList.add('active');
                } else {
                    page.classList.remove('active');
                    if (page.offsetLeft < targetPage.offsetLeft) {
                        page.classList.add('slide-left');
                    } else {
                        page.classList.add('slide-right');
                    }
                }
            });

            // 根据页面类型加载相应数据
            switch(pageId) {
                case 'mainPage':
                    loadProducts();
                    break;
                case 'ordersPage':
                    loadOrders();
                    break;
                case 'chatPage':
                    // 确保聊天容器滚动到底部
                    const chatContainer = document.getElementById('chatContainer');
                    if (chatContainer) {
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }
                    break;
            }
        }

        // 加载商品列表
        function loadProducts() {
            fetch('/api/products')
                .then(response => response.json())
                .then(products => {
                    const categoryMap = {
                        'LEAFY_GREEN': '叶菜类',
                        'ROOT_VEGETABLE': '根茎类',
                        'FRUIT_VEGETABLE': '果菜类',
                        'MUSHROOM': '菌菇类',
                        'BEAN': '豆类',
                        'OTHER': '其他'
                    };
                    const productList = document.getElementById('productList');
                    productList.innerHTML = products.map(product => `
                        <div class="col-md-4 mb-4">
                            <div class="card product-card">
                                <div class="card-body">
                                    <h5 class="card-title">${product.name}</h5>
                                    <p class="card-text">价格: ¥${product.price}</p>
                                    <p class="card-text">类别: ${categoryMap[product.category] || '未知'}</p>
                                    <button class="btn btn-primary" onclick="addToCart(${product.id})">加入购物车</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                });
        }

        // 加载购物车
        function loadCart() {
            fetch('/api/cart')
                .then(response => response.json())
                .then(cart => {
                    const cartItems = document.getElementById('cartItems');
                    cartItems.innerHTML = cart.items.map(item => `
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <h6>${item.productName}</h6>
                                <small>数量: ${item.quantity}</small>
                            </div>
                            <div>
                                <button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.productId})">删除</button>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('cartTotal').textContent = cart.total.toFixed(2);
                });
        }

        // 加载订单历史
        function loadOrders() {
            fetch('/api/orders')
                .then(response => response.json())
                .then(orders => {
                    console.log(orders);
                    const orderList = document.getElementById('orderList');
                    const statusMap = {
                        'PENDING': '待支付',
                        'PAID': '已支付',
                        'SHIPPED': '已发货',
                        'DELIVERED': '已送达',
                        'COMPLETED': '已完成',
                        'CANCELLED': '已取消'
                    };
                    orderList.innerHTML = orders.map(order => `
                        <tr>
                            <td>${order.id}</td>
                            <td>${new Date(order.createdAt).toLocaleString()}</td>
                            <td>${statusMap[order.status] || order.status}</td>
                            <td>¥${order.totalAmount}</td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="viewOrderDetails(${order.id})">查看详情</button>
                            </td>
                        </tr>
                    `).join('');
                });
        }

        // 发送聊天消息
        function sendMessage() {
            const userInput = document.getElementById('userInput');
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';

            fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                addMessage(data.response, 'ai');
            })
            .catch(error => {
                console.error('Error:', error);
                addMessage('抱歉，发生了一些错误，请稍后再试。', 'ai');
            });
        }

        function addMessage(text, type) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 添加到购物车
        function addToCart(productId) {
            fetch('/api/cart/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ productId: productId, quantity: 1 })
            })
            .then(response => response.json())
            .then(cart => {
                loadCart();
            })
            .catch(error => {
                alert('添加失败，请稍后重试。');
            });
        }

        // 从购物车移除
        function removeFromCart(productId) {
            fetch('/api/cart/remove', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ productId: productId })
            })
            .then(response => response.json())
            .then(cart => {
                loadCart();
            })
            .catch(error => {
                alert('移除失败，请稍后重试。');
            });
        }

        // 结算
        function checkout() {
            fetch('/api/orders/create', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    alert('购买成功！');
                    loadCart();
                    loadOrders();
                    refreshBalance();
                } else {
                    alert(result.message || '购买失败！');
                }
            })
            .catch(error => {
                alert('结算失败，请稍后重试。');
            });
        }

        // 新增：刷新余额
        function refreshBalance() {
            fetch('/api/user/balance')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('userBalance').textContent = data.balance;
                });
        }

        // 查看订单详情
        function viewOrderDetails(orderId) {
            fetch(`/api/orders/${orderId}`)
                .then(response => response.json())
                .then(order => {
                    let content = `
                        <div class="mb-3">
                            <h6>订单编号：${order.id}</h6>
                            <h6>下单时间：${new Date(order.createdAt).toLocaleString()}</h6>
                            <h6>订单状态：${order.status === 'PAID' ? '已支付' : order.status}</h6>
                            <h6>总金额：¥${order.totalAmount}</h6>
                        </div>
                        <div class="table-responsive">
                            <table class="table table-sm">
                                <thead>
                                    <tr>
                                        <th>商品名称</th>
                                        <th>单价</th>
                                        <th>数量</th>
                                        <th>小计</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                    (order.items || []).forEach(item => {
                        content += `
                            <tr>
                                <td>${item.productName}</td>
                                <td>¥${item.price}</td>
                                <td>${item.quantity}</td>
                                <td>¥${item.subtotal.toFixed(2)}</td>
                            </tr>
                        `;
                    });
                    content += `
                                </tbody>
                            </table>
                        </div>
                    `;
                    document.getElementById('orderDetailsContent').innerHTML = content;
                    new bootstrap.Modal(document.getElementById('orderDetailsModal')).show();
                })
                .catch(error => {
                    alert('获取订单详情失败，请稍后重试');
                });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 默认显示主页面
            showPage('mainPage');
            
            // 监听Enter键发送消息
            document.getElementById('userInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // 监听充值表单提交
            document.getElementById('rechargeForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const amount = document.getElementById('amount').value;
                fetch('/recharge/add', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ amount: parseFloat(amount) })
                })
                .then(response => response.json())
                .then(data => {
                    alert('充值成功！');
                    refreshBalance();
                    document.getElementById('amount').value = '';
                })
                .catch(error => {
                    alert('充值失败，请稍后重试。');
                });
            });

            // 设置用户名（如果后端未渲染，可用localStorage或Ajax获取）
            if (!document.getElementById('currentUsername').textContent.trim() || document.getElementById('currentUsername').textContent.trim() === '用户') {
                fetch('/api/user/info').then(r=>r.json()).then(data=>{
                    document.getElementById('currentUsername').textContent = data.username;
                });
            }
        });
    </script>
</body>
</html>
